<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">

  <title>获客智能体管理 - 智能营销平台</title>
  <meta name="description" content="配置获客智能体规则引擎，管理名单批次与白名单快照">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* === 主列表：全宽单栏 === */
    .agents-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .agents-search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--bg-card);
      transition: border-color 0.2s;
      min-width: 220px;
    }

    .agents-search-box:focus-within {
      border-color: var(--brand);
    }

    .agents-search-box input {
      border: none;
      background: transparent;
      outline: none;
      font-size: 13px;
      color: var(--gray-900);
      flex: 1;
    }

    .agents-search-box svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      color: var(--gray-400);
      flex-shrink: 0;
    }

    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
      gap: 24px;
    }

    /* 主列表卡片 */
    .agent-main-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    .agent-main-card:hover {
      border-color: var(--brand);
      box-shadow: 0 4px 20px rgba(37, 99, 235, 0.08);
      transform: translateY(-2px);
    }

    .create-card:hover {
      border-color: var(--brand) !important;
      background: rgba(37, 99, 235, 0.02) !important;
    }

    .create-card:hover .cc-icon {
      background: rgba(37, 99, 235, 0.1) !important;
      color: var(--brand) !important;
    }

    .agent-main-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
    }

    .agent-main-card.running::before {
      background: #2563eb;
    }

    .agent-main-card.paused::before {
      background: #d97706;
    }

    .agent-main-card.draft::before {
      background: #9ca3af;
    }

    .amc-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      width: 100%;
      margin-bottom: 20px;
    }

        <h1 class="page-title">获客智能体管理</h1>
        <p class="page-breadcrumb">
          <a href="index.html">工作台</a><span class="sep">/</span>系统配置<span class="sep">/</span>获客智能体管理
        </p>
      </div>

        <div class="kpi-label">本月生成批次名单</div>

    .amc-body {
      width: 100%;
      margin-bottom: 24px;
      flex: 1;
    }

    .amc-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--gray-900);

      display: flex;
      align-items: center;
      gap: 10px;

      font-size: 13px;
      color: var(--gray-500);
      line-height: 1.6;

    .amc-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      padding-top: 20px;

    .amc-stat {
      display: flex;
      flex-direction: column;

    .amc-stat .sv {
      font-size: 18px;
      font-weight: 700;
      color: var(--gray-900);
    }

    .amc-stat .sk {
      font-size: 12px;
      color: var(--gray-500);
      margin-bottom: 4px;
    }

    .amc-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 详情抽屉内部Tab */
    .detail-tabs {
      display: flex;
      border-bottom: 2px solid var(--gray-100);
      margin-bottom: 20px;
      flex-shrink: 0;
    }

    .detail-tab {
      padding: 10px 18px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--gray-500);

      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .detail-tab:hover {
      color: var(--brand);
    }

    .detail-tab.active {
      color: var(--brand);
      border-bottom-color: var(--brand);
      font-weight: 600;
    }

      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--gray-100);
      flex-shrink: 0;
    }

    .detail-drawer-agent-info {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .detail-drawer-icon {
      width: 44px;
      height: 44px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;

      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;

      flex: 1;
      overflow-y: auto;
      padding: 20px 22px;
    }

    .detail-drawer-body::-webkit-scrollbar {
      width: 4px;
    }

    .detail-drawer-body::-webkit-scrollbar-thumb {
      background: var(--gray-200);
      border-radius: 4px;
    }

    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px 18px;
    }

    .kpi-card.featured {
      background: var(--brand-light);
      border-color: var(--brand);
    }

    .kpi-card .kpi-label {
      font-size: 12px;
      color: var(--gray-500);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .kpi-card.featured .kpi-label {
      color: var(--brand);
    }

    .kpi-card .kpi-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--gray-900);
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .kpi-card.featured .kpi-value {
      color: var(--brand);
    }

    .kpi-card .kpi-suffix {
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-400);

      color: #2563eb;
    }

    .batch-source-tag.manual {
      background: #fef3c7;
      color: #92400e;

        <div style="background:var(--gray-50);border-radius:9px;padding:12px 14px;border:1px solid var(--border);margin-bottom:16px;font-size:12.5px;color:var(--gray-600);line-height:1.8;">

        </div>
