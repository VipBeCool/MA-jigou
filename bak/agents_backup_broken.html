<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">

  <title>获客智能体管理 - 智能营销平台</title>

  <link rel="stylesheet" href="css/style.css">
  <style>
    /* === 主列表：全宽单栏 === */
    .agents-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .agents-search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--bg-card);
      transition: border-color 0.2s;
      min-width: 220px;
    }

    .agents-search-box:focus-within {
      border-color: var(--brand);
    }

    .agents-search-box input {
      border: none;
      background: transparent;
      outline: none;
      font-size: 13px;
      color: var(--gray-900);
      flex: 1;
    }

    .agents-search-box svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      color: var(--gray-400);
      flex-shrink: 0;
    }

    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
      gap: 24px;
    }

    /* 主列表卡片 */
    .agent-main-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    .agent-main-card:hover {
      border-color: var(--brand);
      box-shadow: 0 4px 20px rgba(37, 99, 235, 0.08);
      transform: translateY(-2px);
    }

    .create-card:hover {
      border-color: var(--brand) !important;
      background: rgba(37, 99, 235, 0.02) !important;
    }

    .create-card:hover .cc-icon {
      background: rgba(37, 99, 235, 0.1) !important;
      color: var(--brand) !important;
    }

    .agent-main-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
    }

    .agent-main-card.running::before {
      background: #2563eb;
    }

    .agent-main-card.paused::before {
      background: #d97706;
    }

    .agent-main-card.draft::before {
      background: #9ca3af;
    }

    .amc-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      width: 100%;
      margin-bottom: 20px;
    }

        <h1 class="page-title">获客智能体管理</h1>
        <p class="page-breadcrumb">
          <a href="index.html">工作台</a><span class="sep">/</span>系统配置<span class="sep">/</span>获客智能体管理

      </div>

        <div class="kpi-label">本月生成批次名单</div>

    .amc-body {
      width: 100%;
      margin-bottom: 24px;
      flex: 1;
    }

    .amc-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--gray-900);

      display: flex;
      align-items: center;
      gap: 10px;

      font-size: 13px;

    .amc-stats {

      gap: 20px;

      padding-top: 20px;

    .amc-stat .sv {
      font-size: 18px;
      font-weight: 700;
      color: var(--gray-900);
    }

    .amc-stat .sk {

      color: var(--gray-500);
      margin-bottom: 4px;
    }

    .amc-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .detail-tabs {

      margin-bottom: 20px;
      flex-shrink: 0;

    .detail-tab {

      font-weight: 500;
      color: var(--gray-500);

      border-bottom: 2px solid transparent;

      transition: all 0.15s;
      white-space: nowrap;
    }

      color: var(--brand);
    }

    .detail-tab.active {
      color: var(--brand);
      border-bottom-color: var(--brand);
      font-weight: 600;
    }

      flex-shrink: 0;

    .detail-drawer-agent-info {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .detail-drawer-icon {
      width: 44px;
      height: 44px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;

      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;

    }

    .detail-drawer-body::-webkit-scrollbar {
      width: 4px;
    }

    }

    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px 18px;
    }

    .kpi-card.featured {
      background: var(--brand-light);
      border-color: var(--brand);
    }

    .kpi-card .kpi-label {
      font-size: 12px;
      color: var(--gray-500);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .kpi-card.featured .kpi-label {
      color: var(--brand);
    }

    .kpi-card .kpi-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--gray-900);
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .kpi-card.featured .kpi-value {
      color: var(--brand);
    }

    .kpi-card .kpi-suffix {

      font-weight: 500;
      color: var(--gray-400);

    .batch-source-tag.manual {

      let currentStep = 0;

      function openWizard(agentId) {
        currentStep = 0;

        document.getElementById('wizardTitle').textContent = agentId ? '编辑获客智能体' : '新建获客智能体';
        document.getElementById('ruleContainer').innerHTML = '';

      function wizardNext() {
        if (currentStep < TOTAL_STEPS - 1) { currentStep++; updateWizardStep(); }
        else { deployAgent(); }
      }

      function wizardPrev() {
        if (currentStep > 0) { currentStep--; updateWizardStep(); }
      }

      function updateWizardStep() {
        for (let i = 0; i < TOTAL_STEPS; i++) {
          const stepEl = document.getElementById('wstep-' + i);
          const pageEl = document.getElementById('wpage-' + i);
          stepEl.className = 'wizard-step ' + (i < currentStep ? 'done' : i === currentStep ? 'active' : '');
          if (pageEl) pageEl.style.display = i === currentStep ? 'block' : 'none';
        }
        document.getElementById('wizardPrevBtn').style.display = currentStep > 0 ? 'inline-flex' : 'none';
        document.getElementById('wizardNextBtn').textContent = currentStep === TOTAL_STEPS - 1 ? '保存并部署' : '下一步 →';
        if (currentStep === 1) updateRulePreview();
        if (currentStep === 4) initFieldToggles();

      /* ---- 规则引擎 ---- */
      let ruleCount = 0;

      function addRule() {
        ruleCount++;
        const id = 'rule-' + ruleCount;
        const container = document.getElementById('ruleContainer');
        if (container.children.length > 0) {
          const conn = document.createElement('div');
          conn.style.cssText = 'display:flex;align-items:center;gap:6px;margin:4px 0 4px 28px;';
          conn.innerHTML = `<span class="rule-connector" data-mode="AND" onclick="toggleConnector(this)">AND</span><span style="font-size:12px;color:var(--gray-300);">（点击切换 OR）</span>`;
          container.appendChild(conn);
        }
        const row = document.createElement('div');
        row.className = 'rule-row'; row.id = id;
        const indOptions = INDICATOR_LIB.map((i, idx) =>
          `<option value="${i.field}" data-type="${i.type}" data-options="${(i.options || []).join('|')}" data-unit="${i.unit}" ${idx === ruleCount - 1 && ruleCount <= INDICATOR_LIB.length ? 'selected' : ''} >${i.label}</option>`
        ).join('');
        row.innerHTML = `
    <div class="rule-index">${container.querySelectorAll('.rule-row').length + 1}</div>
    <select class="rule-select" style="min-width:140px;" onchange="updateRuleType(this,'${id}')">${indOptions}</select>
    <select class="rule-select op-sel" id="${id}-op" style="width:85px;"><option>>=</option><option>></option><option><=</option><option><</option><option>=</option></select>
    <div id="${id}-val-wrap" style="display:flex;gap:6px;align-items:center;">
      <input class="rule-input" id="${id}-val" type="number" placeholder="数值" oninput="updateRulePreview()">
      <span id="${id}-unit" style="font-size:12px;color:var(--gray-400);white-space:nowrap;"></span>
    </div>
    <button class="rule-remove-btn" onclick="removeRule('${id}')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>`;
        container.appendChild(row);
        updateRuleType(row.querySelector('select'), id);
      }

      function updateRuleType(sel, ruleId) {
        const opt = sel.options[sel.selectedIndex];
        if (!opt) return;
        const type = opt.dataset.type;
        const options = (opt.dataset.options || '').split('|').filter(Boolean);
        const unit = opt.dataset.unit || '';
        const opSel = document.getElementById(ruleId + '-op');
        const valWrap = document.getElementById(ruleId + '-val-wrap');
        if (type === 'number') {
          opSel.innerHTML = '<option>>=</option><option>></option><option><=</option><option><</option><option>=</option><option>!=</option>';
          valWrap.innerHTML = `<input class="rule-input" id="${ruleId}-val" type="number" placeholder="数值" oninput="updateRulePreview()"><span style="font-size:12px;color:var(--gray-400);white-space:nowrap;">${unit}</span>`;
        } else if (type === 'bool' || type === 'enum') {
          opSel.innerHTML = '<option>=</option><option>!=</option>';
          valWrap.innerHTML = `<select class="rule-select" id="${ruleId}-val" onchange="updateRulePreview()">${options.map(o => `<option>${o}</option>`).join('')}</select>`;
        } else if (type === 'multi') {
          opSel.innerHTML = '<option>包含</option><option>不包含</option>';
          valWrap.innerHTML = `<div style="display:flex;gap:8px;flex-wrap:wrap;">${options.map(o => `<label style="display:flex;align-items:center;gap:4px;font-size:12.5px;cursor:pointer;"><input type="checkbox" onchange="updateRulePreview()"> ${o}</label>`).join('')}</div>`;
        } else {
          opSel.innerHTML = '<option>属于</option><option>不属于</option>';
          valWrap.innerHTML = `<input class="rule-input" id="${ruleId}-val" type="text" placeholder="如：A36,C26（行业代码）" oninput="updateRulePreview()" style="width:180px;">`;
        }
        updateRulePreview();
      }

      function toggleConnector(el) {
        el.dataset.mode = el.dataset.mode === 'AND' ? 'OR' : 'AND';
        el.textContent = el.dataset.mode;
        el.style.background = el.dataset.mode === 'OR' ? '#fef3c7' : '';
        el.style.color = el.dataset.mode === 'OR' ? '#92400e' : '';
      }

      function removeRule(id) {
        const row = document.getElementById(id);
        const prev = row.previousElementSibling;
        if (prev && prev.querySelector('.rule-connector')) prev.remove();
        else { const next = row.nextElementSibling; if (next && next.querySelector('.rule-connector')) next.remove(); }
        row.remove();
        document.querySelectorAll('.rule-row').forEach((r, i) => { const idx = r.querySelector('.rule-index'); if (idx) idx.textContent = i + 1; });
        updateRulePreview();
      }

      function updateRulePreview() {
        const bases = [5200, 3800, 2400, 1850, 1200, 900, 650];
        const n = document.querySelectorAll('#ruleContainer .rule-row').length;
        const base = bases[Math.min(n - 1, bases.length - 1)] || 1000;
        const noise = Math.floor(Math.random() * 300 - 150);
        const el = document.getElementById('rulePreviewCount');
        if (el) el.textContent = '约 ' + Math.max(100, base + noise).toLocaleString();
      }

        if (btn.classList.contains('btn-primary')) {
          btn.classList.remove('btn-primary');
          btn.classList.add('btn-default');
        }
        btn.disabled = true;

        setTimeout(function () {
          var modal = btn.closest('#batchSelectModal');
          if (modal) modal.remove();

          // 模拟追加历史记录
          var today = new Date();
          var y = today.getFullYear();
          var m = String(today.getMonth() + 1).padStart(2, '0');
          var d = String(today.getDate()).padStart(2, '0');
          var h = String(today.getHours()).padStart(2, '0');
          var min = String(today.getMinutes()).padStart(2, '0');
          var dateStr = y + '-' + m + '-' + d;
          var nameDateStr = String(y) + m + d;
          var timeStr = dateStr + ' ' + h + ':' + min;
          var randId = String(Math.floor(Math.random() * 900) + 100);

          WHITELIST_DATA.unshift({
            agentId: currentDrawerAgentId,
            version: '快照_' + nameDateStr + '_' + randId,
            genTime: timeStr,
            count: Math.floor(Math.random() * 2000) + 1000,
            status: '历史版本',
            source: source,
            desc: '手动触发生成'
          });

          renderDrawerWhitelist();
          showToast('快照生成成功', 'success');
        }, 600);
      }
      /* ---- 可复用搜索下拉组件 JS ---- */
      function openSearchSelect(id) {
        var wrap = document.getElementById(id);
        if (wrap) wrap.classList.add('open');
      }
      function toggleSearchSelect(id) {
        var wrap = document.getElementById(id);
        if (!wrap) return;
        wrap.classList.contains('open') ? wrap.classList.remove('open') : wrap.classList.add('open');
        if (wrap.classList.contains('open')) { var inp = wrap.querySelector('.search-select-input'); if (inp) inp.focus(); }
      }
      function filterSearchSelect(id, keyword) {
        var wrap = document.getElementById(id);
        if (!wrap) return;
        wrap.classList.add('open');
        var kw = keyword.trim().toLowerCase();
        var hasVisible = false;
        wrap.querySelectorAll('.search-select-option').forEach(function (opt) {
          var match = !kw || opt.textContent.toLowerCase().indexOf(kw) !== -1;
          opt.style.display = match ? '' : 'none';
          if (match) hasVisible = true;
        });
        var empty = wrap.querySelector('.search-select-empty');
        if (empty) empty.style.display = hasVisible ? 'none' : '';
      }
      document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.search-select').forEach(function (wrap) {
          wrap.querySelectorAll('.search-select-option').forEach(function (opt) {
            opt.addEventListener('click', function (e) {
              e.stopPropagation();
              var val = opt.getAttribute('data-value') || opt.textContent;
              var inp = wrap.querySelector('.search-select-input');
              if (inp) inp.value = opt.textContent;
              var hidden = wrap.nextElementSibling;
              if (hidden && hidden.tagName === 'INPUT' && hidden.type === 'hidden') hidden.value = val;
              wrap.querySelectorAll('.search-select-option').forEach(function (o) { o.classList.remove('selected'); });
              opt.classList.add('selected');
              wrap.classList.remove('open');
            });
          });
        });
        document.addEventListener('click', function (e) {
          document.querySelectorAll('.search-select.open').forEach(function (wrap) {
            if (!wrap.contains(e.target)) wrap.classList.remove('open');
          });
        });
      });
      window.openSearchSelect = openSearchSelect;
      window.toggleSearchSelect = toggleSearchSelect;
      window.filterSearchSelect = filterSearchSelect;
    </script>

</body>
