  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css?v=1783867207">

<body>

    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content anim-fade-in" id="main"></main>
  </div>

  <script src="js/sidebar.js"></script>
  <script>
    // ── 初始化 ──
    const role = sessionStorage.getItem('wb_role') || 'manager';
    const page = 'home';

    renderSidebar({ currentPage: page, role });

    // ── 数据 Mock ──
    const DATA = {
      manager: {
        stats: [
          { label: '客户总数', value: '3,856', suffix: '', featured: true, subLeft: '待触达', subLeftValue: '468', subLeftSuffix: '家', subRight: '待分配', subRightValue: '126' },
          { icon: 'clipboard', label: '本周触达', value: '72', suffix: '家' },
          { icon: 'target', label: '本周意向', value: '89', suffix: '' },
          { icon: 'bank', label: '本月授信金额', value: '5,280', suffix: '万' },
          { icon: 'trending_up', label: '本月放款金额', value: '2,760', suffix: '万' },
        ],
        alertBanner: {
          text: '3 个批次等待分配：橙业贷·5月8日（126家）、厂房贷·5月5日（89家）等待下发',

        },

          { icon: 'shuffle', label: '名单分配', sub: '统筹分配营销线索', href: 'allocation.html' },
          { icon: 'network', label: '组织架构', sub: '灵活配置机构层级', href: 'org-config.html' },
          { icon: 'bot', label: '智能体', sub: '构建智能获客引擎', href: 'agents.html' },
          { icon: 'users', label: '团队管理', sub: '掌控团队作业效能', href: 'team.html' },

        ],
        pendingBatches: [
          { name: '橙业贷·2026年5月8日批次', status: '未分配', count: 126, age: 3, color: '#f59e0b' },
          { name: '厂房贷·2026年5月5日批次', status: '未分配', count: 89, age: 6, color: '#f59e0b' },
          { name: '科技贷·2026年5月1日批次', status: '部分分配', count: 42, age: 11, color: '#2563eb' },
        ],
        teamProgress: [
          { name: '朱某人', initials: '朱', color: '#8b5cf6', done: 17, target: 20 },
          { name: '王芳', initials: '王', color: '#10b981', done: 14, target: 20 },
          { name: '张伟', initials: '张', color: '#f59e0b', done: 11, target: 20 },
          { name: '陈静', initials: '陈', color: '#ef4444', done: 8, target: 20 },
        ],
        activities: [
          { enterprise: '苏州科技有限公司', uscc: '91320500MA1TXXXXX1', rm: '王芳', team: '苏州分行', action: '完成首次触达', type: 'touched', time: '刚刚' },
          { enterprise: '南京制造集团', uscc: '91320100MA2PXXXXX2', rm: '李明', team: '南京分行', action: '确认意向', type: 'intent', time: '1小时前' },
          { enterprise: '无锡纶织股份公司', uscc: '91320200MA3QXXXXX3', rm: '张伟', team: '苏州分行', action: '完成首次触达', type: 'touched', time: '今天 10:30' },
          { enterprise: '常州建材有限公司', uscc: '91320400MA4RXXXXX4', rm: '赵静', team: '常州分行', action: '确认意向', type: 'intent', time: '昨天' },
          { enterprise: '镇江食品加工厂', uscc: '91321100MA5SXXXXX5', rm: '陈浩', team: '镇江分行', action: '再次跟进', type: 'follow', time: '昨天' },
        ],
      },
      rm: {
        stats: [
          { icon: 'users', label: '待触达客户', value: '23', suffix: '家', featured: true, subLeft: '较上周', subLeftValue: '↓ 5', subRight: '全部客户', subRightValue: '124' },
          { icon: 'clipboard', label: '本周触达', value: '45', suffix: '家' },
          { icon: 'target', label: '本周意向', value: '12', suffix: '家' },
          { icon: 'bank', label: '本月授信', value: '1,850', suffix: '万' },
          { icon: 'trending_up', label: '本月放款', value: '380', suffix: '万' },
        ],
        shortcuts: [
          { icon: 'users', label: '我的客户', sub: '管理全量客户商机', href: 'customers.html' },
          { icon: 'activity', label: '营销跟进', sub: '推进核心商机转化', href: 'tasks.html' },
          { icon: 'download', label: '下载中心', sub: '集中下载生成名单', href: 'downloads.html' },
          { icon: 'target', label: 'AI尽调', sub: '敬请期待', href: 'javascript:void(0)', upcoming: true },
        ],
        todos: [
          { company: '苏州华远科技', industry: '科技', contact: '张总', priority: 'high', status: 'pending', age: 3 },
          { company: '南京隆兴贸易', industry: '贸易', contact: '王经理', priority: 'mid', status: 'contacted', age: 1 },
          { company: '无锡精密机械', industry: '制造', contact: '李总', priority: 'mid', status: 'pending', age: 5 },
          { company: '常州绿能建材', industry: '建材', contact: '赵老板', priority: 'low', status: 'pending', age: 7 },
          { company: '南通海泰物流', industry: '物流', contact: '陈总', priority: 'low', status: 'pending', age: 2 },
        ],
        followGroups: [
          {
            id: 'confirm', label: '确认意向', color: '#ef4444', items: [
              { name: '南京创新智造集团有限公司', sub: '意向沟通中', time: '2天前', href: 'customer-detail.html' },
            ]
          },
          {
            id: 'retry', label: '再次联系', color: '#f59e0b', items: [
              { name: '苏州生物医药研究院有限公司', sub: '触达失败·无人接听', time: '2天前', href: 'customer-detail.html' },
              { name: '无锡集成电路设计有限公司', sub: '触达失败·拒绝沟通', time: '1天前', href: 'customer-detail.html' },
            ]
          },
          {
            id: 'push', label: '推进转化', color: '#10b981', items: [
              { name: '南京艾科微电子有限公司', sub: '明确有意向·待引导申请', time: '3天前', href: 'customer-detail.html' },
            ]
          },
          {
            id: 'credit', label: '跟进授信', color: '#2563eb', items: [
              { name: '无锡光电半导体有限公司', sub: '已提交申请·等待审批', time: '2天前', href: 'customer-detail.html' },
              { name: '常州智能制造系统有限公司', sub: '业务审批中', time: '12天前', href: 'customer-detail.html' },
            ]
          },
          {
            id: 'drawdown', label: '引导提款', color: '#8b5cf6', items: [
              { name: '苏州华远科技有限公司', sub: '已授信·未放款', time: '5天前', href: 'customer-detail.html' },
            ]
          },
        ],
      },
    };

    // ── 渲染主内容 ──
    function renderMain() {
      const d = DATA[role];
      if (!d) return;

      if (role === 'rm') renderRmView(d);
      else renderAdminView(d);
    }

    /* ── 统计卡片（参照移动端：1个大主卡 + 4个小卡横排） ── */
    function renderStats(stats) {
      if (!stats || !stats.length) return '';
      const featured = stats[0];
      const rest = stats.slice(1);
      return `
    <style>
      .wb-metrics { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
      .wb-metric-hero {
        position: relative; overflow: hidden; border-radius: 18px;
        background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
        color: #fff; padding: 24px 28px 22px;
        box-shadow: 0 10px 28px -8px rgba(37,99,235,0.45);
        cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      }
      .wb-metric-hero:hover { transform: translateY(-2px); box-shadow: 0 16px 32px -8px rgba(37,99,235,0.55); }
      /* 斜线装饰（移动端同款） */
      .wb-metric-hero::before { content:''; position:absolute; right:28px; top:-24px; bottom:-24px; width:56px; background:rgba(255,255,255,0.1); transform:skewX(-25deg); }
      .wb-metric-hero::after  { content:''; position:absolute; right:100px; top:-24px; bottom:-24px; width:20px; background:rgba(255,255,255,0.15); transform:skewX(-25deg); }
      .wb-metric-hero-arrow { position:absolute; right:28px; top:50%; transform:translateY(-50%); font-size:28px; font-weight:700; opacity:0.9; }
      .wb-metric-hero-label { font-size:13px; color:rgba(255,255,255,0.9); font-weight:500; margin-bottom:8px; }
      .wb-metric-hero-val { font-size:44px; font-weight:800; line-height:1; letter-spacing:-1px; }
      .wb-metric-hero-suffix { font-size:18px; font-weight:600; margin-left:4px; opacity:0.9; }
      .wb-metric-hero-foot { display:flex; justify-content:space-between; align-items:center; margin-top:16px; margin-right:32px; }
      .wb-metric-hero-trend { background:rgba(255,255,255,0.15); color:#fff; font-size:12px; padding:4px 10px; border-radius:100px; }
      .wb-metric-smalls { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
      .wb-metric-small {
        background: #f8fafc; border: 1px solid var(--gray-100); border-radius: 14px;
        padding: 16px 18px; transition: all 0.2s;
      }
      .wb-metric-small:hover { background: #fff; border-color: #dbeafe; box-shadow: 0 4px 12px -4px rgba(37,99,235,0.12); transform: translateY(-2px); }
      .wb-metric-small-label { font-size: 12.5px; color: var(--gray-500); font-weight: 500; margin-bottom: 6px; }
      .wb-metric-small-val { font-size: 26px; font-weight: 800; color: var(--gray-900); line-height: 1; }
      .wb-metric-small-suffix { font-size: 12px; color: var(--gray-500); margin-left: 3px; font-weight: 500; }

    </style>
    <div class="wb-metrics">
      <!-- 大主卡 -->
      <div class="wb-metric-hero" onclick="location.href='customers.html'">
        <div class="wb-metric-hero-arrow">›</div>
        <div class="wb-metric-hero-label">${featured.label}</div>
        <div class="wb-metric-hero-val">${featured.value}<span class="wb-metric-hero-suffix">${featured.suffix}</span></div>
        <div class="wb-metric-hero-foot">
          ${featured.subLeft ? `
            <div class="wb-metric-hero-trend" style="margin-top:0;">
                ${featured.subLeft} <span style="font-family:'SF Mono',monospace;font-weight:700;">${featured.subLeftValue}</span> ${featured.subLeftSuffix || ''}
            </div>
            <div style="color:rgba(255,255,255,0.9);font-size:13px;font-weight:500;">
                ${featured.subRight} <span style="font-size:13px;font-family:'SF Mono',monospace;font-weight:700;color:#fff;">${featured.subRightValue}</span>
            </div>
          ` : `
            <div class="wb-metric-hero-trend">${featured.trend || ''}</div>
          `}
        </div>
      </div>
      <!-- 小卡横排 -->
      <div class="wb-metric-smalls">
        ${rest.map(s => `
          <div class="wb-metric-small">
            <div class="wb-metric-small-label">${s.label}</div>
            <div class="wb-metric-small-val">${s.value}<span class="wb-metric-small-suffix">${s.suffix}</span></div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
    }


    /* 管理员视图 */
    function renderAdminView(d) {
      const r = d;
      document.getElementById('main').innerHTML = `
    <!-- 页面头部 -->
    <div class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">工作台</h1>
        <p class="page-breadcrumb">
          ${new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}
        </p>
      </div>

    </div>

    <!-- 统计卡片 -->
    ${renderStats(r.stats)}

    <style>
      .shortcut-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
      .shortcut-card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px -8px rgba(37,99,235,0.25); border-color: #3b82f6 !important; }
      .shortcut-icon-box { transition: all 0.3s ease; }
      .shortcut-card:hover .shortcut-icon-box { background: #2563eb !important; color: white !important; transform: scale(1.1); }
      .batch-item { transition: all 0.2s ease; }
      .batch-item:hover { transform: translateX(5px); border-color: #3b82f6 !important; box-shadow: 0 4px 12px -4px rgba(37,99,235,0.15); }
    </style>

    <!-- 提醒横幅 -->
    ${r.alertBanner ? `
    <div style="display:flex;align-items:center;gap:12px;padding:13px 18px;background:#fffbeb;border:1px solid #fde68a;border-radius:12px;margin-bottom:20px;cursor:pointer;"
         onclick="location.href='${r.alertBanner.link}'">
      <span class="icon-svg" style="width:18px;height:18px;color:#f59e0b;">${ICONS.bell}</span>
      <span style="flex:1;font-size:13.5px;color:#92400e;">${r.alertBanner.text}</span>
      <span style="font-size:13px;color:#d97706;font-weight:600;">立即处理 →</span>
    </div>
    ` : ''}

    <!-- 快捷入口 (全宽) -->
    <div style="margin-bottom: 24px;">
      ${r.shortcuts ? renderShortcuts(r.shortcuts) : ''}
    </div>

    <!-- 中间区块 -->
    <div style="display:grid;grid-template-columns:1fr 350px;gap:24px;align-items:start;">
      <div style="display:flex;flex-direction:column;gap:24px;">
        ${renderRightPanel(r)}
      </div>
      <div style="display:flex;flex-direction:column;gap:24px;">
        ${renderPendingBatches(r)}
      </div>
    </div>
  `;
    }

    function renderShortcuts(shortcuts) {
      return `
    <div class="card" style="box-shadow:0 4px 20px rgba(0,0,0,0.03);border:none;">
      <div class="card-header"><h3 class="card-title">
        <span class="card-title-icon icon-svg">${ICONS.layers}</span>
        快捷入口
      </h3></div>
      <div class="card-body" style="padding-top:16px;">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;">
          ${shortcuts.map(s => `
            <a href="${s.href}" class="shortcut-card" style="
              display:flex;flex-direction:row;align-items:center;gap:16px;position:relative;
              padding:18px 20px;border-radius:14px;border:1px solid var(--gray-100);
              text-decoration:none;background:linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);color:var(--gray-800);
              ${s.upcoming ? 'opacity:0.6;cursor:not-allowed;filter:grayscale(100%);' : ''}">
              ${s.upcoming ? '<span style="position:absolute;top:6px;right:6px;font-size:10px;background:var(--gray-200);color:var(--gray-600);padding:2px 6px;border-radius:4px;">建设中</span>' : ''}
              <span class="shortcut-icon-box" style="width:46px;height:46px;flex-shrink:0;background:var(--brand-light);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--brand);">
                <span class="icon-svg" style="width:24px;height:24px;">${ICONS[s.icon] || ''}</span>
              </span>
              <div style="display:flex;flex-direction:column;align-items:flex-start;gap:2px;">
                <span style="font-size:14px;font-weight:700;white-space:nowrap;color:var(--gray-900);">${s.label}</span>
                <span style="font-size:12px;color:var(--gray-400);white-space:nowrap;">${s.sub}</span>
              </div>
            </a>
          `).join('')}
        </div>
      </div>
    </div>
  `;
    }

    function renderPendingBatches(r) {
      if (!r.pendingBatches) return '';
      return `
    <div class="card" style="box-shadow:0 4px 20px rgba(0,0,0,0.03);border:none;">
      <div class="card-header">
        <h3 class="card-title">
          <span class="card-title-icon icon-svg">${ICONS.layers}</span>
          待分配批次
        </h3>
        <a href="allocation.html" class="card-extra" style="color:var(--brand);font-weight:500;">全部批次 <span class="icon-svg" style="width:14px;height:14px;vertical-align:middle;display:inline-block;">${ICONS.chevron_right}</span></a>
      </div>
      <div class="card-body" style="padding-top:16px;">
        ${r.pendingBatches.map(b => `
          <a href="allocation.html" class="batch-item" style="
            display:flex;align-items:center;gap:12px;padding:14px 16px;
            border-radius:12px;border:1px solid var(--gray-100);margin-bottom:12px;
            text-decoration:none;cursor:pointer;background:#fff;">
            <div style="width:36px;height:36px;border-radius:10px;background:var(--brand-light);display:flex;align-items:center;justify-content:center;color:var(--brand);flex-shrink:0;">
              <span class="icon-svg" style="width:18px;height:18px;">${ICONS.layers}</span>
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:14px;font-weight:600;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${b.name}</div>
              <div style="display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--gray-500);margin-top:6px;">
                <span style="display:inline-flex;align-items:center;background:#fffbeb;color:#d97706;padding:2px 6px;border-radius:4px;font-weight:500;">未分配</span>
                <span style="color:var(--gray-400);">已生成 ${b.age} 天</span>
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0;padding-left:8px;">
              <div style="font-size:20px;font-weight:800;color:var(--gray-900); font-family:'SF Mono',monospace;">${b.count}</div>
            </div>
          </a>
        `).join('')}
      </div>
    </div>
  `;
    }

    function renderRightPanel(r) {
      const activitiesHtml = (r.activities || []).map(a => {
        const badgeClass = 'activity-badge--' + a.type;
        const itemClass = 'activity-item--' + a.type;
        const badgeText = a.type === 'intent' ? '确认意向' : (a.type === 'follow' ? '再次跟进' : '已触达');

        const iconSvg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18"></path><path d="M6 12H4a2 2 0 0 0-2 2v8"></path><path d="M18 16h2a2 2 0 0 1 2 2v4"></path><path d="M10 6h4"></path><path d="M10 10h4"></path><path d="M10 14h4"></path><path d="M10 18h4"></path></svg>`;
        const timeIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;

        return `
      <div class="activity-item ${itemClass}">
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <div style="width:38px;height:38px;background:#eff6ff;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--brand);flex-shrink:0;">
            ${iconSvg}
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:14px;font-weight:700;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${a.enterprise}</div>
            <div style="font-size:11px;color:var(--gray-400);font-family:'SF Pro Display',monospace;margin-top:2px;">${a.uscc}</div>
            <div style="font-size:12px;color:var(--gray-500);margin-top:4px;">
              <strong style="color:var(--gray-700);font-weight:600;">${a.rm}</strong>（${a.team}）${a.action}
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px dashed var(--gray-200);">
          <div class="activity-badge ${badgeClass}" style="font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;">
            <span style="width:6px;height:6px;border-radius:50%;display:inline-block;background:currentColor;"></span>
            ${badgeText}
          </div>
          <div style="font-size:11px;color:var(--gray-400);display:flex;align-items:center;gap:4px;">
            ${timeIcon}
            ${a.time}
          </div>
        </div>
      </div>
    `;
      }).join('');

      return `
    <div style="display:flex;flex-direction:column;gap:24px;">
      <div class="card" style="box-shadow:0 4px 20px rgba(0,0,0,0.03);border:none;">
        <div class="card-header">
          <h3 class="card-title">
            <span class="card-title-icon icon-svg">${ICONS.activity || ICONS.clock || ''}</span>
            最新跟进
          </h3>
          <a href="customers.html" class="card-extra" style="color:var(--brand);font-weight:500;">全部名单 <span class="icon-svg" style="width:14px;height:14px;vertical-align:middle;display:inline-block;">${ICONS.chevron_right}</span></a>
        </div>
        <div class="card-body" style="padding-top:16px;">
          <style>
            .activity-item {
              background: #fff; border-radius: 10px; padding: 14px;
              border: 1px solid var(--gray-200); box-shadow: 0 1px 4px rgba(0,0,0,0.03);
              transition: all 0.2s; cursor: pointer;
              position: relative; z-index: 1; overflow: hidden;
            }
            .activity-item::before {
              content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: transparent; transition: background 0.2s;
            }
            .activity-item:hover { 
              border-color: var(--brand);
              box-shadow: 0 6px 16px rgba(37,99,235,0.08); 
              transform: translateY(-2px);
              z-index: 2;
            }
            .activity-item--intent::before  { background: #10b981; }
            .activity-item--touched::before { background: #3b82f6; }
            .activity-item--follow::before  { background: #f59e0b; }
            .activity-badge--intent { color: #10b981; }
            .activity-badge--touched { color: #3b82f6; }
            .activity-badge--follow { color: #f59e0b; }
          </style>
          <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;">
            ${activitiesHtml}
          </div>
        </div>
      </div>
    </div>
  `;
    }

    /* 客户经理视图 */
    function renderRmView(d) {
      // 把所有分组按 PC 多列方式渲染，每组一列
      const followCols = (d.followGroups || []).map(g => {
        const total = g.items.length;
        const rows = g.items.map(item => `
      <a href="${item.href}" class="follow-pc-row">
        <div class="follow-pc-dot" style="background:${g.color};"></div>
        <div class="follow-pc-info">
          <div class="follow-pc-name">${item.name}</div>
          <div class="follow-pc-sub">${item.sub} · ${item.time}</div>
        </div>
        <span class="icon-svg follow-pc-chev">${ICONS.chevron_right}</span>
      </a>
    `).join('');
        return `
      <div class="follow-pc-col">
        <div class="follow-pc-col-hd" style="border-left:3px solid ${g.color};">
          <span class="follow-pc-col-label">${g.label}</span>
          <span class="follow-pc-badge" style="color:${g.color};background:${g.color}18;">${total}</span>
        </div>
        <div class="follow-pc-rows">${rows}</div>
      </div>
    `;
      }).join('');

      document.getElementById('main').innerHTML = `
    <style>
      .premium-card { background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%); color: white; position: relative; overflow: hidden; box-shadow: 0 12px 24px -8px rgba(37,99,235,0.5); border: none; }
      .premium-card::before { content: ''; position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%); border-radius: 50%; }
      .premium-card .stat-label, .premium-card .stat-suffix, .premium-card .stat-trend { color: rgba(255,255,255,0.85); }
      .premium-card .stat-value { color: white; }
      .premium-card .stat-card-icon { background: rgba(255,255,255,0.2); color: white; }
      .shortcut-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
      .shortcut-card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px -8px rgba(37,99,235,0.25); border-color: #3b82f6 !important; }
      .shortcut-card:hover .shortcut-icon-box { background: #2563eb !important; color: white !important; transform: scale(1.1); }
      /* 需要关注 多列布局 */
      .follow-pc-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
      .follow-pc-col { background: #fff; border-radius: 12px; border: 1px solid var(--gray-100); padding: 0; overflow: hidden; }
      .follow-pc-col-hd { display: flex; align-items: center; gap: 8px; padding: 12px 14px; background: var(--gray-50); border-bottom: 1px solid var(--gray-100); }
      .follow-pc-col-label { font-size: 13px; font-weight: 700; color: var(--gray-700); }
      .follow-pc-badge { font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 100px; margin-left: auto; }
      .follow-pc-rows { padding: 4px 0; }
      .follow-pc-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; text-decoration: none; border-bottom: 1px solid var(--gray-50); transition: background 0.15s; cursor: pointer; }
      .follow-pc-row:last-child { border-bottom: none; }
      .follow-pc-row:hover { background: #f8fafc; }
      .follow-pc-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
      .follow-pc-info { flex: 1; min-width: 0; }
      .follow-pc-name { font-size: 13px; font-weight: 600; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .follow-pc-sub { font-size: 11.5px; color: var(--gray-400); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .follow-pc-chev { width: 13px; height: 13px; color: var(--gray-300); flex-shrink: 0; }
    </style>
    <div class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">工作台</h1>
        <p class="page-breadcrumb">
          ${new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}
        </p>
      </div>

    </div>

    <!-- 统计卡片 -->
    ${renderStats(d.stats)}


    <!-- 快捷入口 -->
    ${renderShortcuts(d.shortcuts)}

    <!-- 需要关注（全宽多列） -->
    <div class="card" style="box-shadow:0 4px 20px rgba(0,0,0,0.03);border:none;margin-top:24px;">
      <div class="card-header">
        <h3 class="card-title">
          <span class="card-title-icon icon-svg">${ICONS.flag}</span>
          需要关注
        </h3>
        <a href="tasks.html" class="card-extra" style="color:var(--brand);font-weight:500;">全部 <span class="icon-svg" style="width:14px;height:14px;vertical-align:middle;display:inline-block;">${ICONS.chevron_right}</span></a>
      </div>
      <div class="card-body" style="padding-top:16px;">
        <div class="follow-pc-grid">
          ${followCols}
        </div>
      </div>
    </div>
  `;
    }

    renderMain();
  </script>
  <script src="js/toast.js"></script>
</body>

</html>
