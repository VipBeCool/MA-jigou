<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <title>数据看板 - 智能营销平台</title>
  <meta name="description" content="智能营销平台整体数据看板，展示转化漏斗、区域分布和团队绩效">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css?v=1783685212">
  <style>
    /* ── 漏斗图 ── */
    .funnel-wrap { padding: 8px 20px; }
    .funnel-step {
      display: flex; align-items: center; gap: 14px; margin-bottom: 10px;
    }
    .funnel-label { width: 70px; font-size: 12.5px; color: var(--gray-500); text-align: right; flex-shrink: 0; }
    .funnel-bar-wrap { flex: 1; display: flex; align-items: center; gap: 8px; }
    .funnel-bar {
      height: 32px; border-radius: 6px; background: var(--brand);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 12.5px; font-weight: 700;
      transition: width 0.5s;
    }
    .funnel-pct {
      width: 40px; font-size: 12px; color: var(--gray-400); text-align: right; flex-shrink: 0;
    }

    /* ── 区域条形图 ── */
    .region-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .region-name { width: 80px; font-size: 13px; color: var(--gray-700); flex-shrink: 0; }
    .region-bar-wrap { flex: 1; background: var(--gray-100); border-radius: 4px; height: 10px; overflow: hidden; }
    .region-bar { height: 100%; border-radius: 4px; background: var(--brand); transition: width 0.6s; }
    .region-val { width: 36px; font-size: 12.5px; font-weight: 700; color: var(--brand); text-align: right; flex-shrink: 0; }

    /* ── 趋势迷你图（纯CSS折线模拟） ── */
    .trend-mini {
      width: 100%; height: 48px; position: relative; overflow: hidden;
    }
    .trend-mini-bars {
      display: flex; align-items: flex-end; gap: 4px; height: 100%;
    }
    .trend-mini-bar {
      flex: 1; border-radius: 3px 3px 0 0; background: var(--brand-border);
      transition: background 0.15s;
    }
    .trend-mini-bar.today { background: var(--brand); }

    /* ── 月度折线（SVG） ── */
    .chart-svg { width: 100%; overflow: visible; }
  </style>
</head>
<body>
<div class="app-container">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content anim-fade-in">

    <div class="page-header">
      <div class="page-header-left">
        <h1 class="page-title">数据看板</h1>
        <p class="page-breadcrumb">
          <a href="index.html">工作台</a><span class="sep">/</span>数据分析<span class="sep">/</span>数据看板
        </p>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <select class="form-control" style="width:auto;" id="dateRange" onchange="render()">
          <option value="month">本月</option>
          <option value="quarter">本季度</option>
          <option value="year">本年</option>
        </select>
        <button class="btn btn-default" id="btnExport">
          <span id="btnExportIcon" style="width:15px;height:15px;"></span>
          导出报告
        </button>
      </div>
    </div>

    <!-- 核心 KPI -->
    <div class="stat-cards" style="margin-bottom:24px;" id="kpiCards"></div>

    <!-- 第一行：漏斗 + 区域分布 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
      <!-- 转化漏斗 -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title"><span class="card-title-icon" id="funnelIcon"></span>转化漏斗</h3>
          <span style="font-size:12px;color:var(--gray-400);">本月</span>
        </div>
        <div class="card-body" style="padding-top:16px;" id="funnelPanel"></div>
      </div>

      <!-- 区域分布 -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title"><span class="card-title-icon" id="regionIcon"></span>区域触达分布</h3>
          <span style="font-size:12px;color:var(--gray-400);">本月</span>
        </div>
        <div class="card-body" style="padding-top:16px;" id="regionPanel"></div>
      </div>
    </div>

    <!-- 行业维度分析（新增） -->
    <div class="card" style="margin-bottom:20px;">
      <div class="card-header">
        <h3 class="card-title"><span class="card-title-icon" id="industryIcon"></span>重点行业触达与转化分析</h3>
        <span style="font-size:12px;color:var(--gray-400);">本月各行业意向转化率对比</span>
      </div>
      <div class="card-body" style="padding-top:16px;" id="industryPanel"></div>
    </div>

    <!-- 第二行：每日趋势 + 产品对比 -->
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px;">
      <!-- 每日触达趋势（SVG折线） -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title"><span class="card-title-icon" id="trendIcon"></span>每日触达趋势</h3>
          <div style="display:flex;gap:14px;font-size:12px;">
            <span style="display:flex;align-items:center;gap:5px;color:var(--brand);">
              <span style="width:12px;height:2px;background:var(--brand);border-radius:1px;"></span>触达数
            </span>
            <span style="display:flex;align-items:center;gap:5px;color:var(--success);">
              <span style="width:12px;height:2px;background:var(--success);border-radius:1px;"></span>意向数
            </span>
          </div>
        </div>
        <div class="card-body" style="padding-top:8px;">
          <svg class="chart-svg" viewBox="0 0 600 140" preserveAspectRatio="none" id="trendSVG" style="height:140px;"></svg>
        </div>
      </div>

      <!-- 产品对比 -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title"><span class="card-title-icon" id="productIcon"></span>产品触达量</h3>
        </div>
        <div class="card-body" style="padding-top:16px;" id="productPanel"></div>
      </div>
    </div>

    <!-- 第三行：团队绩效排行 -->
    <div class="card">
      <div class="card-header">
        <h3 class="card-title"><span class="card-title-icon" id="teamIcon"></span>团队绩效</h3>
        <a href="team.html" class="card-extra">查看团队详情 →</a>
      </div>
      <div class="card-body" style="padding:0;">
        <div class="table-wrapper">
          <table class="table" id="teamTable"></table>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="js/sidebar.js"></script>
<script>
const role = sessionStorage.getItem('wb_role') || 'manager';
renderSidebar({ currentPage: 'dashboard', role });

document.getElementById('btnExportIcon').innerHTML  = ICONS.download;
document.getElementById('funnelIcon').innerHTML  = `<span style="width:16px;height:16px;">${ICONS.filter}</span>`;
document.getElementById('regionIcon').innerHTML  = `<span style="width:16px;height:16px;">${ICONS.network}</span>`;
document.getElementById('industryIcon').innerHTML = `<span style="width:16px;height:16px;">${ICONS.chart}</span>`;
document.getElementById('trendIcon').innerHTML   = `<span style="width:16px;height:16px;">${ICONS.trending_up}</span>`;
document.getElementById('productIcon').innerHTML = `<span style="width:16px;height:16px;">${ICONS.layers}</span>`;
document.getElementById('teamIcon').innerHTML    = `<span style="width:16px;height:16px;">${ICONS.users}</span>`;

const PERIOD_DATA = {
  month: {
    kpi: [
      { icon:'users',   label:'本月下发名单', value:'1,024', suffix:'家', featured: true },
      { icon:'target',  label:'已触达客户',   value:'856',   suffix:'家', trend:'↑ 12% 较上月', trendDir:'up' },
      { icon:'trending_up', label:'意向转化',  value:'124',  suffix:'家', trend:'14.5% 转化率' },
      { icon:'chart',   label:'本月放款金额', value:'8,520', suffix:'万', trend:'↑ 22% 较上月', trendDir:'up' },
    ],
    funnel: [
      { label:'下发名单', val: 1024, maxVal: 1024 },
      { label:'已触达',   val:  856, maxVal: 1024 },
      { label:'建立意向', val:  124, maxVal: 1024 },
      { label:'授信申请', val:   78, maxVal: 1024 },
      { label:'成功放款', val:   45, maxVal: 1024 },
    ],
    regions: [
      { name:'苏州', touch:248, max:300 },
      { name:'南京', touch:198, max:300 },
      { name:'无锡', touch:162, max:300 },
      { name:'常州', touch:128, max:300 },
      { name:'南通', touch:84,  max:300 },
      { name:'泰州', touch:36,  max:300 },
    ],
    industries: [
      { name: '智能制造', touch: 310, intent: 58, max: 400 },
      { name: '新能源', touch: 185, intent: 42, max: 400 },
      { name: '进出口贸易', touch: 142, intent: 15, max: 400 },
      { name: '新材料', touch: 115, intent: 18, max: 400 },
      { name: '其他', touch: 104, intent: 8, max: 400 }
    ],
    trend: [45,38,52,61,48,70,55,63,42,68,80,75,58,92,67,74,83,91,72,85,78,95,88,103,76,89,112,98,85,107,96],
    trendIntent: [5,4,6,7,5,9,6,8,4,7,9,8,6,12,7,9,10,11,8,10,9,13,11,15,9,12,14,13,11,14,12],
    products: [
      { name:'橙业贷', touch:380, color:'#2563eb' },
      { name:'厂房贷', touch:256, color:'#10b981' },
      { name:'科技贷', touch:148, color:'#8b5cf6' },
      { name:'绿色贷', touch:72,  color:'#f59e0b' },
    ],
    team: [
      { name:'朱某人', initials:'朱', color:'#8b5cf6', touch:95, intent:14, loan:840,  rank:1 },
      { name:'钱伟东', initials:'钱', color:'#0ea5e9', touch:89, intent:13, loan:760,  rank:2 },
      { name:'王芳',   initials:'王', color:'#10b981', touch:78, intent:11, loan:620,  rank:3 },
      { name:'李磊',   initials:'李', color:'#2563eb', touch:72, intent:10, loan:580,  rank:4 },
      { name:'张伟',   initials:'张', color:'#f59e0b', touch:65, intent:8,  loan:420,  rank:5 },
      { name:'陈静',   initials:'陈', color:'#ef4444', touch:48, intent:5,  loan:240,  rank:6 },
      { name:'赵小雨', initials:'赵', color:'#6366f1', touch:41, intent:4,  loan:180,  rank:7 },
      { name:'孙秀英', initials:'孙', color:'#f97316', touch:28, intent:2,  loan:80,   rank:8 },
    ],
  },
};

function render() {
  const range = document.getElementById('dateRange').value;
  const d = PERIOD_DATA[range] || PERIOD_DATA.month;

  // KPI 卡片
  document.getElementById('kpiCards').innerHTML = d.kpi.map(s => `
    <div class="stat-card ${s.featured?'featured':''}">
      <div class="stat-card-icon"><span style="width:20px;height:20px;">${ICONS[s.icon]||''}</span></div>
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value}<span class="stat-suffix">${s.suffix}</span></div>
      ${s.trend ? `<div class="stat-trend ${s.trendDir||''}">${s.trend}</div>` : ''}
    </div>
  `).join('');

  // 漏斗
  document.getElementById('funnelPanel').innerHTML = `
    <div class="funnel-wrap">
      ${d.funnel.map((step, i) => {
        const pct = Math.round(step.val / step.maxVal * 100);
        const opacity = 1 - i * 0.13;
        const convPct = i > 0 ? Math.round(step.val / d.funnel[i-1].val * 100) + '%' : '—';
        return `
          <div class="funnel-step">
            <div class="funnel-label">${step.label}</div>
            <div class="funnel-bar-wrap">
              <div class="funnel-bar" style="width:${pct}%;opacity:${opacity};min-width:60px;">
                ${step.val}
              </div>
            </div>
            <div class="funnel-pct" style="color:${i>0&&convPct<'80%'?'var(--warning)':'var(--gray-400)'};">
              ${convPct}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  // 区域
  const maxTouch = Math.max(...d.regions.map(r=>r.touch));
  document.getElementById('regionPanel').innerHTML = d.regions.map(r => `
    <div class="region-row">
      <div class="region-name">${r.name}</div>
      <div class="region-bar-wrap">
        <div class="region-bar" style="width:${Math.round(r.touch/maxTouch*100)}%;"></div>
      </div>
      <div class="region-val">${r.touch}</div>
    </div>
  `).join('');

  // 行业
  const maxIndTouch = Math.max(...d.industries.map(i => i.touch));
  document.getElementById('industryPanel').innerHTML = `
    <div style="display: flex; gap: 40px;">
      <div style="flex: 2;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 12px; color: var(--gray-400);">
          <span style="width: 80px;">行业名称</span>
          <span style="flex: 1;">触达数量占比</span>
          <span style="width: 60px; text-align: right;">意向数</span>
        </div>
        ${d.industries.map(ind => `
          <div class="region-row">
            <div class="region-name" style="width: 80px;">${ind.name}</div>
            <div class="region-bar-wrap" style="height: 12px; border-radius: 6px;">
              <div class="region-bar" style="width:${Math.round(ind.touch/maxIndTouch*100)}%; background: linear-gradient(90deg, #3b82f6, #60a5fa); border-radius: 6px;"></div>
            </div>
            <div class="region-val" style="width: 60px; color: var(--gray-700);">${ind.intent} <span style="font-size: 11px; color: var(--gray-400); font-weight: normal;">/ ${ind.touch}</span></div>
          </div>
        `).join('')}
      </div>
      <div style="flex: 1; border-left: 1px solid var(--border); padding-left: 20px;">
        <div style="font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 16px;">转化率分析建议</div>
        <div style="padding: 12px; background: var(--brand-light); border-radius: 8px; border: 1px solid var(--brand-border); font-size: 12.5px; color: var(--brand); line-height: 1.6;">
          <strong style="display: block; margin-bottom: 4px;">💡 智能洞察：</strong>
          <span style="color: var(--gray-700);">本月 <strong>新能源</strong> 行业触达转化率表现最佳（达22.7%），建议在探客平台配置【新能源专项】策略组合；<br/>进出口贸易转化率偏低（10.5%），建议调整为短信/公众号唤醒替代人工外呼。</span>
        </div>
      </div>
    </div>
  `;

  // 趋势 SVG
  drawTrendChart(d.trend, d.trendIntent);

  // 产品
  const maxProd = Math.max(...d.products.map(p=>p.touch));
  document.getElementById('productPanel').innerHTML = d.products.map(p => `
    <div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
        <span style="font-size:13px;font-weight:600;color:var(--gray-800);">${p.name}</span>
        <span style="font-size:13px;font-weight:800;color:${p.color};">${p.touch}</span>
      </div>
      <div class="region-bar-wrap">
        <div class="region-bar" style="width:${Math.round(p.touch/maxProd*100)}%;background:${p.color};"></div>
      </div>
    </div>
  `).join('');

  // 团队表格
  document.getElementById('teamTable').innerHTML = `
    <thead>
      <tr>
        <th>排名</th>
        <th>成员</th>
        <th>触达数</th>
        <th>意向数</th>
        <th>转化率</th>
        <th>放款金额</th>
        <th>进度</th>
      </tr>
    </thead>
    <tbody>
      ${d.team.map(m => {
        const cr = m.touch > 0 ? (m.intent/m.touch*100).toFixed(1) : '0.0';
        const rankColors = ['#fbbf24','#94a3b8','#c2855d'];
        const rankStyle  = m.rank <= 3
          ? `background:${rankColors[m.rank-1]};color:#fff;`
          : `background:var(--gray-100);color:var(--gray-500);`;
        return `
          <tr>
            <td>
              <div style="width:22px;height:22px;border-radius:7px;font-size:12px;font-weight:800;
                display:flex;align-items:center;justify-content:center;${rankStyle}">${m.rank}</div>
            </td>
            <td>
              <div style="display:flex;align-items:center;gap:8px;">
                <div style="width:30px;height:30px;border-radius:50%;background:var(--gray-100);
                  color:var(--gray-500);display:flex;align-items:center;justify-content:center;">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <span style="font-size:13.5px;font-weight:600;">${m.name}</span>
              </div>
            </td>
            <td style="font-weight:700;">${m.touch}</td>
            <td style="font-weight:700;">${m.intent}</td>
            <td>
              <span style="font-size:13px;font-weight:700;color:${parseFloat(cr)>=10?'var(--success)':'var(--gray-600)'};">${cr}%</span>
            </td>
            <td style="font-weight:700;">${m.loan}万</td>
            <td style="min-width:80px;">
              <div class="progress" style="height:5px;">
                <div class="progress-fill" style="width:${Math.min(Math.round(m.touch/100*100),100)}%;"></div>
              </div>
            </td>
          </tr>
        `;
      }).join('')}
    </tbody>
  `;
}

function drawTrendChart(touchData, intentData) {
  const svg = document.getElementById('trendSVG');
  if (!svg) return;
  const W = 600, H = 130, PAD = 10;
  const n   = touchData.length;
  const max = Math.max(...touchData, ...intentData) * 1.1;

  function toY(v) { return H - PAD - (v / max) * (H - PAD * 2); }
  function toX(i) { return PAD + (i / (n-1)) * (W - PAD*2); }

  // 触达折线
  const touchPath  = touchData.map((v,i) => `${i===0?'M':'L'}${toX(i)},${toY(v)}`).join(' ');
  // 意向折线
  const intentPath = intentData.map((v,i) => `${i===0?'M':'L'}${toX(i)},${toY(v)}`).join(' ');
  // 触达面积填充
  const areaPath = touchData.map((v,i) => `${i===0?'M':'L'}${toX(i)},${toY(v)}`).join(' ')
    + ` L${toX(n-1)},${H-PAD} L${toX(0)},${H-PAD} Z`;

  // 辅助线
  const gridLines = [0, 0.25, 0.5, 0.75, 1].map(p => {
    const y = PAD + (1-p) * (H - PAD*2);
    const v = Math.round(max * p);
    return `
      <line x1="${PAD}" y1="${y}" x2="${W-PAD}" y2="${y}" stroke="var(--gray-100)" stroke-width="1"/>
      <text x="${PAD}" y="${y}" dy="-3" font-size="9" fill="var(--gray-400)">${v}</text>
    `;
  }).join('');

  // 今日点
  const lastX = toX(n-1), lastY = toY(touchData[n-1]);

  svg.innerHTML = `
    <defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#2563eb" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#2563eb" stop-opacity="0.01"/>
      </linearGradient>
    </defs>
    ${gridLines}
    <path d="${areaPath}" fill="url(#areaGrad)" stroke="none"/>
    <path d="${touchPath}"  fill="none" stroke="#2563eb"   stroke-width="2" stroke-linejoin="round"/>
    <path d="${intentPath}" fill="none" stroke="#10b981"   stroke-width="2" stroke-linejoin="round" stroke-dasharray="4,3"/>
    <circle cx="${lastX}" cy="${lastY}" r="4" fill="#2563eb"/>
    <circle cx="${lastX}" cy="${lastY}" r="7" fill="#2563eb" opacity="0.2"/>
  `;
}

render();
</script>
  <script src="js/toast.js"></script>
</body>
</html>
